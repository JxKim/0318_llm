dataset_args:
  general_qa:
    aggregation: mean
    data_statistics: null
    dataset_id: benchmark/custom_eval/text/qa
    default_subset: default
    description: '

      ## Overview


      General-QA is a customizable question answering benchmark for evaluating language
      models on open-ended text generation tasks. It supports flexible data formats
      and configurable evaluation metrics.


      ## Task Description


      - **Task Type**: Open-Ended Question Answering

      - **Input**: Question (with optional system prompt and conversation history)

      - **Output**: Free-form text answer

      - **Flexibility**: Supports custom datasets via local files


      ## Key Features


      - Flexible input format (query/answer or messages format)

      - Optional system prompt support

      - BLEU and Rouge evaluation metrics

      - Custom dataset support via local file loading

      - Extensible for various QA use cases


      ## Evaluation Notes


      - Default configuration uses **0-shot** evaluation

      - Default metrics: **BLEU**, **Rouge** (Rouge-L-R as main score)

      - Evaluates on **test** split

      - See [User Guide](https://evalscope.readthedocs.io/en/latest/advanced_guides/custom_dataset/llm.html#qa)
      for dataset format

      '
