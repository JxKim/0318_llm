  prompt_template: "你是一个中文关键词抽取评测裁判。不要输出分析过程。\n\n  请判断模型抽取的关键词的效果。最终输出一个分数。\n  最终只输出一个分数，格式必须为\
    \ [[0到1之间的小数]]，例如 [[0.8]]\n\n示例：\n任务：\n抽取出文本中的关键词：\n标题：人工神经网络在猕猴桃种类识别上的应用\n文本：在猕猴桃介电特性研究的基础上,将人工神经网络技术应用于猕猴桃的种类识别.该种类识别属于模式识别,其关键在于提取样品的特征参数,在获得特征参数的基础上,选取合适的网络通过训练来进行识别.猕猴桃种类识别的研究为自动化识别果品的种类、品种和新鲜等级等提供了一种新方法,为进一步研究果品介电特性与其内在品质的关系提供了一定的理论与实践基础.\n\
    模型输出：\n食品科学技术基础学科;猕猴桃;应用;人工神经网络;介电特性;识别\n你的最终输出：[[0.9]]\n\n\n评分标准：\n1、模型是否按照特定格式输出，权重：0.6\n\
    2、所提取的内容，和原文的关联程度，权重：0.4\n最终将结果限制到0-1的范围当中\n\n  [题目]\n  {question}\n\n\n  [模型输出]\n\
    \  {pred}\n\n  输出一个最终的0-1的分数"
